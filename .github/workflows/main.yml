name: Test and check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test_check:
    name: Test and Check
    strategy:
      matrix:
        os:
          # These are all the targets we build the tools for
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source files
        uses: actions/checkout@v4
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install missing components
        run: rustup component add rustfmt clippy
      - name: Cargo fmt
        run: cargo fmt --all --check
      - name: Cargo clippy
        shell: bash
        run: |
          cargo clippy --workspace --all-targets -- \
          --deny=warnings \
          --deny=clippy::default_trait_access \
          --deny=clippy::arithmetic_side_effects \
          --deny=clippy::manual_let_else --deny=clippy::uninlined-format-args \
          --deny=clippy::used_underscore_binding
      - name: Cargo test
        if: matrix.os == 'ubuntu-22.04'
        run: cargo test --workspace
      - name: Cargo test (skip alternate download)
        if: matrix.os != 'ubuntu-22.04'
        run: cargo test --workspace  -- --skip test_alternate_download --skip test_binaries_work
